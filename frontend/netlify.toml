[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect all routes to index.html for React SPA client-side routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api/* to the Vercel backend so the frontend never exposes the backend URL
[[redirects]]
  from   = "/api/*"
  to     = "https://wix-hubspot-sync.vercel.app/api/:splat"
  status = 200
  force  = true

[context.production.environment]
  VITE_API_URL = ""

[context.deploy-preview.environment]
  VITE_API_URL = "https://wix-hubspot-sync.vercel.app"
